# Vibe Coding Proxy 配置文件
# 与 proxy.db 同目录（打包成 exe 后位于 exe 同目录）。修改后需重启服务生效。
# 文件可选：删除或留空某项时，使用代码内置默认值（端口 5000，管理员 admin/admin123）。

[server]
# 服务启动端口（1-65535），未配置时默认 5000
port = 5000

[admin]
# 管理员账号与密码。
# 每次启动都会校准 admin_users 表，使其与此处保持一致：
#   - 修改密码后重启即生效
#   - 修改用户名后重启即生效（旧用户名会被删除）
username = admin
password = admin@123
