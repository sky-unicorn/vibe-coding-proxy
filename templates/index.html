<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Coding 服务转发</title>
<link href="/static/lib/jsoneditor/jsoneditor.min.css" rel="stylesheet" type="text/css">
<link href="/static/lib/jsoneditor/darktheme.css" rel="stylesheet" type="text/css">
<link href="/static/lib/element-plus/index.css" rel="stylesheet" type="text/css">
<link href="/static/css/element-plus-dark.css" rel="stylesheet" type="text/css">
<script src="/static/lib/vue/vue.global.prod.js"></script>
<script src="/static/lib/element-plus/index.full.min.js"></script>
<script src="/static/lib/element-plus/zh-cn.min.js"></script>
<script src="/static/lib/element-plus-icons/index.iife.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e4e4e7;--text2:#9ca3af;--primary:#6366f1;--primary-h:#818cf8;--danger:#ef4444;--success:#22c55e;--warn:#f59e0b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:600}
/* 版本徽章已迁移为 el-tag（shell/app.js）；ver-badge / ver-refresh-btn 退役 */
.url-bar{display:flex;gap:12px;flex-wrap:wrap}
.url-item{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px}
.url-item .url-label{font-weight:600;white-space:nowrap}
.url-item .url-label.anthropic{color:var(--primary)}
.url-item .url-label.openai{color:#10b981}
.url-item code{font-family:monospace;color:var(--text);user-select:all;cursor:pointer}
/* 旧 .tabs/.tab 原生导航已迁移为 el-tabs（shell/app.js） */
/* Vue 外壳 el-tabs 适配：复用 .tabs 背景与下边框，隐藏空 content 区 */
#vue-shell-tabs .el-tabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px}
#vue-shell-tabs .el-tabs__header{margin:0;border:0}
#vue-shell-tabs .el-tabs__nav-wrap::after{display:none}
#vue-shell-tabs .el-tabs__content{display:none}
.content{padding:24px;max-width:100%;margin:0 auto;overflow-x:auto}
.panel{display:none}
.panel.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px;overflow-x:auto}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-header h2{font-size:16px;font-weight:600}
/* 旧 .btn/.btn-primary/.btn-danger/.btn-sm/.btn-secondary 原生按钮已迁移为 el-button */
table{width:100%;border-collapse:collapse;min-width:900px}
th,td{text-align:left;padding:8px 8px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;white-space:nowrap}
th{color:var(--text2);font-weight:500;font-size:12px;letter-spacing:.3px}
tr:hover{background:rgba(99,102,241,.05)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
/* 旧 .badge-success/.badge-error/.badge-anthropic/.badge-openai/.badge-warn/.badge-degrade 已迁移为 el-tag */
/* 旧 .degradation-bar 降级配置条已迁移为 el-dialog（models.js） */
/* 旧 .concurrency-bar 仍由 providers.js 使用，保留 */
.concurrency-bar{display:flex;align-items:center;gap:6px;min-width:100px}
.concurrency-bar .bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;min-width:40px}
.concurrency-bar .bar-fill{height:100%;border-radius:3px;transition:width .3s}
.concurrency-bar .bar-fill.ok{background:var(--success)}
.concurrency-bar .bar-fill.warn{background:var(--warn)}
.concurrency-bar .bar-fill.full{background:var(--danger)}
.concurrency-bar .label{font-size:11px;color:var(--text2);white-space:nowrap}
/* 旧 .modal/.modal-overlay/.form-group/.form-actions/.input-with-toggle/.input-toggle-btn 已迁移为 el-dialog/el-form/el-input(show-password) */
.key-mask{font-family:monospace;letter-spacing:1px}
/* 角色映射弹窗（rm-tip/rm-empty 仍由 models.js 使用；旧 .rm-row/.rm-arrow/.rm-del/.rm-add/.rm-rules-list 已迁移为 el-input+el-button） */
.rm-tip{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--primary);border-radius:6px;padding:10px 12px;margin-bottom:14px;font-size:12px;line-height:1.6;color:var(--text2)}
.rm-tip code{background:rgba(99,102,241,.15);color:var(--primary-h);padding:1px 5px;border-radius:3px;font-size:11px}
.rm-empty{text-align:center;padding:18px 12px;color:var(--text2);font-size:12px;background:var(--bg);border:1px dashed var(--border);border-radius:8px}
/* 旧 .pagination 原生分页已迁移为 el-pagination */
.filters{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.filters input,.filters select{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px}
/* 旧 #log-detail-modal 原生弹窗已迁移为 el-dialog.is-log-detail（logs.js） */
.custom-scroll::-webkit-scrollbar{width:6px;height:6px}
.custom-scroll::-webkit-scrollbar-track{background:transparent}
.custom-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
.custom-scroll::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.25)}
.custom-scroll::-webkit-scrollbar-corner{background:transparent}
.log-detail{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;margin-top:8px;font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;color:var(--text2)}
/* 旧 .toggle/.toggle-slider/.toggle-locked 原生开关已迁移为 el-switch */
/* 旧 .badge-billing-* 已迁移为 el-tag；.billing-section/.price-row/.form-group 已迁移为 el-drawer+el-form */
.bar-fill.danger{background:#f97316}
/* 旧 .billing-drawer-* 原生抽屉已迁移为 el-drawer（billing.js） */
.usage-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;min-width:240px;flex:1}
.usage-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.usage-card-header h4{font-size:14px;font-weight:600}
.usage-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.usage-row .usage-label{width:60px;color:var(--text2);white-space:nowrap}
.usage-row .usage-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.usage-row .usage-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.usage-row .usage-val{width:120px;text-align:right;font-family:monospace;font-size:11px;white-space:nowrap}
.billing-summary{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.billing-stat{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 20px;min-width:140px;text-align:center}
.billing-stat .val{font-size:22px;font-weight:700}
.billing-stat .lbl{font-size:11px;color:var(--text2);margin-top:4px}
.billing-cards{display:flex;gap:12px;flex-wrap:wrap}
.json-editor-wrap{margin-top:8px;height:calc(90vh - 120px)!important}
.json-editor-wrap .jsoneditor{height:100%!important}
.json-editor-wrap .jsoneditor .jsoneditor-outer{height:100%!important}
.json-editor-wrap .jsoneditor .ace_editor{height:100%!important}
/* 模型映射别名颜色（同名别名行同色，做隐式分组）；旧 tr[data-alias] 已由 #vue-models el-table row-style 接管 */
.alias-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;background:rgba(var(--alias-rgb),.2);color:rgb(var(--alias-rgb));gap:6px}
.alias-color-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:rgb(var(--alias-rgb));flex-shrink:0}
/* el-table 别名分组行底色（models 面板）：单元格透明，行底色由 row-style 在 tr 注入 --alias-rgb */
#vue-models .el-table__row>td.el-table__cell{background-color:transparent!important}
#vue-models .el-table__body tr.el-table__row:hover,#vue-models .el-table__body tr.el-table__row.hover-row{background-color:rgba(var(--alias-rgb),.14)!important}
/* 旧 .feature-toast* 浮层已迁移为 ElMessage/ElNotification（shell/app.js / panels） */
/* MCP / Nacos Tab 视觉规范 */
.mcp-url-bar{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:12px;transition:border-color .15s}
.mcp-url-bar:hover{border-color:rgba(99,102,241,.4)}
.mcp-url-bar .url-label{font-size:12px;font-weight:600;white-space:nowrap}
.mcp-url-bar code{font-family:monospace;font-size:13px;flex:1;user-select:all;cursor:pointer;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* 旧 .copy-btn-mcp 原生复制按钮已迁移为 el-button；.btn-secondary 已被 el-button 替代 */
/* 行内 code 标签（form 提示文字里的内联 code），统一紫调 */
.inline-code{background:rgba(99,102,241,.15);color:var(--primary-h);padding:1px 5px;border-radius:3px;font-size:11px;font-family:monospace}
/* 表单字段下方的小号说明文字 */
.form-hint{font-size:11px;color:var(--text2);margin-top:4px;display:block;line-height:1.5}
.form-hint code{background:rgba(99,102,241,.15);color:var(--primary-h);padding:1px 5px;border-radius:3px;font-size:11px}
/* 旧 details.mcp-details 折叠区已迁移为 el-collapse（mcp.js） */
.mcp-code-sample-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.mcp-code-sample-label code{background:rgba(99,102,241,.15);color:var(--primary-h);padding:1px 5px;border-radius:3px;font-size:11px}
pre.mcp-code-block{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:monospace;font-size:12px;overflow-x:auto;color:var(--text);line-height:1.5;margin:0}
/* 旧 #panel-mcp .mcp-tools-table 原生表格已迁移为 el-table */
/* MCP 端点提示框（warn 色调左条），与 rm-tip 同语言 */
.mcp-tip{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--primary);border-radius:6px;padding:10px 12px;font-size:12px;line-height:1.6;color:var(--text2)}
.mcp-tip.tip-warn{border-left-color:var(--warn)}
.mcp-tip strong{color:var(--text)}
/* 旧 .mcp-square/.mcp-card/.mcp-card-toggle 原生卡片已迁移为 el-card（mcp.js） */
.mcp-card-icon{width:40px;height:40px;border-radius:8px;background:rgba(99,102,241,.18);color:var(--primary-h);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.mcp-card-title{font-size:15px;font-weight:600;line-height:1.4}
.mcp-card-desc{font-size:12px;color:var(--text2);line-height:1.55}
.mcp-card-stats{display:flex;gap:6px;flex-wrap:wrap}
.mcp-stat{font-size:11px;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 8px;white-space:nowrap}
.mcp-stat strong{color:var(--text);font-weight:600}
/* 旧 .mcp-card-toggle 已迁移为 el-button link（mcp.js） */
</style>
</head>
<body>

<div id="vue-shell-header"></div>

<div id="vue-shell-tabs"></div>

<div class="content">
  <!-- 提供商管理 -->
  <div id="panel-providers" class="panel active">
    <div id="vue-providers"></div>
  </div>

  <!-- 模型映射 -->
  <div id="panel-models" class="panel">
    <div id="vue-models"></div>
  </div>

  <!-- 错误码映射 -->
  <div id="panel-errors" class="panel">
    <div id="vue-errors"></div>
  </div>

  <!-- 日志 -->
  <div id="panel-logs" class="panel">
    <div id="vue-logs"></div>
  </div>

  <!-- API Key 管理 -->
  <div id="panel-apikeys" class="panel">
    <div id="vue-apikeys"></div>
  </div>

  <!-- 计费管理 -->
  <div id="panel-billing" class="panel">
    <div id="vue-billing"></div>
  </div>

  <!-- MCP / Nacos -->
  <div id="panel-mcp" class="panel">
    <div id="vue-mcp"></div>
  </div>
</div>

<!-- 日志详情 / 计费设置 已迁移为 Vue 岛屿内的 el-dialog / el-drawer（static/js/panels/logs.js、billing.js） -->

<script src="/static/lib/jsoneditor/jsoneditor.js"></script>
<script>
const API='';

// ---- 外壳（Header/Tabs）已迁移为 Vue 岛屿 static/js/shell/app.js，原生 switchTab 与浮层提示已退役 ----

// ---- Logs / Cleanup 已迁移为 Vue 岛屿 static/js/panels/logs.js ----

// ---- Billing（billingModeLabel / copyUrl / logout 已迁入 Vue 组件：billing.js / shell/app.js，旧全局函数退役）----
// ---- MCP 广场（已迁移为 Vue 岛屿 static/js/panels/mcp.js）----

// ---- Utils（供各 Vue 面板 globalProperties 引用；esc/formatTime/formatTokens/maskKey/truncateUrl 保留为全局函数）----
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function maskKey(k){if(!k)return '';if(k.length<=8)return '****';return k.slice(0,4)+'****'+k.slice(-4)}
function truncateUrl(u){if(!u)return '';if(u.length<=30)return u;return u.slice(0,12)+'...'+u.slice(-15)}
function formatTokens(n){if(n>=1e6)return(n/1e6).toFixed(1).replace(/\.0$/,'')+'M';if(n>=1e3)return(n/1e3).toFixed(1).replace(/\.0$/,'')+'K';return n.toString()}
function formatTime(t){if(!t)return '';try{return new Date(t).toLocaleString('zh-CN')}catch{return t}}

// 版本徽章 / URL 初始化已迁移至 Vue 外壳组件（static/js/shell/app.js）
</script>
<script src="/static/js/panels/apikeys.js"></script>
<script src="/static/js/panels/errors.js"></script>
<script src="/static/js/panels/providers.js"></script>
<script src="/static/js/panels/models.js"></script>
<script src="/static/js/panels/billing.js"></script>
<script src="/static/js/panels/logs.js"></script>
<script src="/static/js/panels/mcp.js"></script>
<script src="/static/js/shell/app.js"></script>
</body>
</html>
